name: Deploy Production

on:
  workflow_run:
    workflows: ["Deploy Staging"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> $GITHUB_OUTPUT

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE,COMPOSE_PROJECT_DIR,DOPPLER_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export PROD_IMAGE="$IMAGE"
            doppler run -- docker compose -f "$COMPOSE_PROJECT_DIR/docker-compose.yml" pull portfolio-prod
            doppler run -- docker compose -f "$COMPOSE_PROJECT_DIR/docker-compose.yml" up -d --no-deps portfolio-prod
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ steps.image.outputs.ref }}
          COMPOSE_PROJECT_DIR: ${{ vars.COMPOSE_PROJECT_DIR }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
