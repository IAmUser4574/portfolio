name: Deploy Production

on:
  workflow_run:
    workflows: ["Deploy Staging"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, sud-vps]
    permissions:
      packages: read
    env:
      COMPOSE_PROJECT_DIR: ${{ vars.COMPOSE_PROJECT_DIR || '/opt/briton' }}
      IMAGE: ghcr.io/${{ github.repository }}:latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy prod
        run: |
          cd "$COMPOSE_PROJECT_DIR"
          printf 'PROD_IMAGE=%s\n' "$IMAGE" > .env.github.prod
          docker compose --env-file .env.github.prod pull portfolio-prod
          docker compose --env-file .env.github.prod up -d --no-deps portfolio-prod
