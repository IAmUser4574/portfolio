name: Deploy Staging

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: [self-hosted, sud-vps]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=staging-latest
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build
    runs-on: [self-hosted, sud-vps]
    permissions:
      packages: read
    env:
      COMPOSE_PROJECT_DIR: ${{ vars.COMPOSE_PROJECT_DIR }}
      IMAGE: ghcr.io/${{ github.repository }}:staging-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy staging
        run: |
          cd "$COMPOSE_PROJECT_DIR"
          printf 'STAGING_IMAGE=%s\n' "$IMAGE" > .env.github.staging
          docker compose --env-file .env.github.staging pull portfolio-staging
          docker compose --env-file .env.github.staging up -d --no-deps portfolio-staging
