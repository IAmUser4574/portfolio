name: Deploy Staging

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: repo
        run: echo "lower=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.lower }}
          tags: |
            type=raw,value=staging-latest
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - id: image
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}:staging-latest" >> $GITHUB_OUTPUT

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE,COMPOSE_PROJECT_DIR
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            printf 'STAGING_IMAGE=%s\n' "$IMAGE" > "$COMPOSE_PROJECT_DIR/.env.github.staging"
            docker compose -f "$COMPOSE_PROJECT_DIR/docker-compose.yml" --env-file "$COMPOSE_PROJECT_DIR/.env.github.staging" pull portfolio-staging
            docker compose -f "$COMPOSE_PROJECT_DIR/docker-compose.yml" --env-file "$COMPOSE_PROJECT_DIR/.env.github.staging" up -d --no-deps portfolio-staging
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ steps.image.outputs.ref }}
          COMPOSE_PROJECT_DIR: ${{ vars.COMPOSE_PROJECT_DIR }}
